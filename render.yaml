# Render.com Blueprint — деплой всего приложения одной кнопкой
# https://render.com/docs/blueprint-spec
 
databases:
  # ── PostgreSQL база данных (бесплатный план) ──
  - name: ent-prep-db
    plan: free
    databaseName: entprep
    user: entprep
 
services:
  # ── Django Backend (с фронтендом) ──
  - type: web
    name: ent-prep
    env: python
    buildCommand: |
      # Билдим фронтенд
      cd frontend
      npm install
      npm run build
 
      # Копируем билд фронтенда в static для Django
      cd ..
      mkdir -p backend/staticfiles
      cp -r frontend/dist/* backend/staticfiles/
 
      # Устанавливаем Python-зависимости и готовим Django
      cd backend
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: cd backend && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: NODE_VERSION
        value: "20"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ent-prep-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
 
